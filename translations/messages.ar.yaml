help:
  faq_title: "الأسئلة الشائعة - تقدير، عرض، فاتورة"
  faq_heading: "الأسئلة الشائعة: تقدير، عرض، فاتورة"
  faq_intro: "تشرح هذه الصفحة باختصار دور كل نوع من المستندات في SoloDesk ومتى يستخدم."
  estimation_title: "1) تقدير (تقدير أولي)"
  estimation_text: "التقدير هو <strong>مسودة داخلية</strong> لتحديد الحاجة ومناقشة النطاق وتحضير المشروع. ليس عرضًا رسميًا."
  estimation_point1: "يُستخدم قبل الموافقة."
  estimation_point2: "يمكن تعديله بحرية."
  estimation_point3: "لا يُعد التزامًا تعاقديًا."
  estimate_title: "2) عرض"
  estimate_text: "العرض هو <strong>المستند الرسمي</strong> المرسل للعميل ويحدد الخدمات والسعر والشروط."
  estimate_point1: "أساس قبول العميل."
  estimate_point2: "يجب أن يكون واضحًا ودقيقًا ومؤرخًا."
  estimate_point3: "يمكن استخدامه لإنشاء فاتورة."
  invoice_title: "3) فاتورة"
  invoice_text: "الفاتورة هي <strong>المستند النهائي للبيع</strong> الذي يطلق الدفع ويحتوي على المعلومات المعتمدة."
  invoice_point1: "مستند محاسبي رسمي."
  invoice_point2: "تُنشأ بعد قبول العرض أو انتهاء الخدمة."
  invoice_point3: "تتبع حالة المدفوعات."
  summary_title: "الخلاصة"
  summary_text: "<strong>التقدير</strong> = تحضير داخلي. <strong>العرض</strong> = اقتراح رسمي للعميل. <strong>الفاتورة</strong> = المستند النهائي للدفع."
  workflow_title: "البدء خطوة بخطوة"
  workflow_intro: "عند الاستخدام الأول، اتبع هذه الخطوات بالترتيب. تفتح كل بطاقة الشاشة المعنية مباشرة."
  workflow_step_1: "الخطوة 1"
  workflow_step_1_title: "إعداد الشركة"
  workflow_step_1_text: "أدخل الاسم والمعلومات القانونية والإعدادات المفيدة."
  workflow_step_2: "الخطوة 2"
  workflow_step_2_title: "إنشاء عميل"
  workflow_step_2_text: "أضف معلومات الاتصال واختر العملة."
  workflow_step_3: "الخطوة 3"
  workflow_step_3_title: "إنشاء تقدير أولي"
  workflow_step_3_text: "حدد الحاجة والميزانية قبل تحضير المشروع أو العرض الرسمي."
  convert_title: "تحضير مشروع من تقدير أولي"
  convert_text: "يفتح زر تحضير مشروع نموذجًا معبأ مسبقًا. لا يتم إنشاء أي مشروع حتى تراجع المعلومات وتضغط على حفظ. الرجوع للخلف لا يحفظ شيئًا."
  personas_title: "أي مسار تختار؟"
  persona_simple_title: "مهمة بسيطة"
  persona_simple_text: "أنشئ العميل ثم أنشئ عرضًا أو فاتورة مباشرة عندما تكون الحاجة واضحة."
  persona_project_title: "مشروع يحتاج إلى تحديد"
  persona_project_text: "ابدأ بتقدير أولي، ثم حضر المشروع، وبعدها أنشئ مستندات البيع."
  persona_service_title: "خدمة منجزة"
  persona_service_text: "أنشئ المتعاون والخدمة، ثم اربطها بفاتورة لمتابعة الدفع."

