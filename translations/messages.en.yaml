help:
  faq_title: "FAQ - Estimation, Estimate, Invoice"
  faq_heading: "FAQ: Estimation, Estimate, Invoice"
  faq_intro: "This FAQ explains what each document type is for in SoloDesk, and when to use it."
  estimation_title: "1) Estimation (pre‑estimate)"
  estimation_text: "An estimation is an <strong>internal draft</strong> to frame the need, discuss a range, and prepare the project. It is not an official estimate."
  estimation_point1: "Used upstream, before validation."
  estimation_point2: "Can evolve freely."
  estimation_point3: "Should not be considered a contractual commitment."
  estimate_title: "2) Estimate"
  estimate_text: "The estimate is <strong>the official document</strong> sent to the client. It formalizes services, price, and terms."
  estimate_point1: "Basis for client acceptance."
  estimate_point2: "Must be clear, precise, and dated."
  estimate_point3: "Can be used as a basis for creating an invoice."
  invoice_title: "3) Invoice"
  invoice_text: "The invoice is <strong>the final sales document</strong> that triggers payment. It includes validated information."
  invoice_point1: "Official accounting document."
  invoice_point2: "Generated after the estimate is accepted or the service is completed."
  invoice_point3: "Tracks payment status."
  summary_title: "Summary"
  summary_text: "<strong>Estimation</strong> = internal preparation. <strong>Estimate</strong> = official proposal to the client. <strong>Invoice</strong> = final document to be paid."
  workflow_title: "Step-by-step setup"
  workflow_intro: "For your first use, follow these steps in order. Each card opens the relevant screen."
  workflow_step_1: "Step 1"
  workflow_step_1_title: "Configure the company"
  workflow_step_1_text: "Enter the name, legal information, and useful settings."
  workflow_step_2: "Step 2"
  workflow_step_2_title: "Create a client"
  workflow_step_2_text: "Add contact details and select the currency."
  workflow_step_3: "Step 3"
  workflow_step_3_title: "Create a pre-estimate"
  workflow_step_3_text: "Frame the need and budget before preparing the project or official estimate."
  convert_title: "Prepare a project from a pre-estimate"
  convert_text: "The Prepare a project button opens a prefilled form. No project is created until you review the information and click Save. Going back saves nothing."
  personas_title: "Which workflow should you choose?"
  persona_simple_title: "Simple assignment"
  persona_simple_text: "Create the client, then create an estimate or invoice directly when the need is already clear."
  persona_project_title: "Project to scope"
