help:
  faq_title: "FAQ - Estimation, Devis, Facture"
  faq_heading: "FAQ : Estimation, Devis, Facture"
  faq_intro: "Cette FAQ explique simplement à quoi sert chaque type de document dans SoloDesk, et quand l'utiliser."
  estimation_title: "1) Estimation (pré‑estimation)"
  estimation_text: "L’estimation est <strong>un brouillon interne</strong> pour cadrer le besoin, discuter d’un ordre de grandeur et préparer le projet. Ce n’est pas un devis officiel."
  estimation_point1: "Utilisée en amont, avant validation."
  estimation_point2: "Peut évoluer librement."
  estimation_point3: "Ne doit pas être considérée comme un engagement contractuel."
  estimate_title: "2) Devis"
  estimate_text: "Le devis est <strong>le document officiel</strong> envoyé au client. Il formalise les prestations, le prix et les conditions."
  estimate_point1: "Base d’acceptation par le client."
  estimate_point2: "Doit être clair, précis et daté."
  estimate_point3: "Peut servir de base pour créer une facture."
  invoice_title: "3) Facture"
